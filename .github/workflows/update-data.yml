# 🌸 AIKO BBF — Auto Update Data dari Google Sheets
name: Update Data

on:
  schedule:
    - cron: '0 0 * * *'  # Setiap hari jam 00:00 UTC (07:00 WIB)
  workflow_dispatch:      # Bisa di-run manual

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Fetch data from Google Sheets
        run: node scripts/fetch-data.js
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SHEET_ID: '1pFXNG_Qxkx1hhMbd6_E4ETbNGo_laUl7tU9ODrcIq-s'
      
      - name: Commit updated data
        run: |
          git config user.name "AIKO BBF Bot"
          git config user.email "bot@aiko-bbf.local"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Auto-update data $(date +'%d/%m/%Y')"
          git push
